<script>
  (function () {
    // Phone auto-format
    const phoneEl = document.getElementById('dwp-phone');
    phoneEl.addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '');
      if (v.length <= 3)      this.value = v;
      else if (v.length <= 6) this.value = '(' + v.slice(0,3) + ') ' + v.slice(3);
      else                    this.value = '(' + v.slice(0,3) + ') ' + v.slice(3,6) + '-' + v.slice(6,10);
    });

    function toE164(phone) {
      const d = phone.replace(/\D/g, '');
      return d.length === 10 ? '+1' + d : '+' + d;
    }

    document.getElementById('dwpSignupForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const name    = document.getElementById('dwp-name').value.trim();
      const phone   = toE164(document.getElementById('dwp-phone').value);
      const group   = document.querySelector('input[name="group"]:checked')?.value;
      const btn     = document.getElementById('dwpSubmitBtn');
      const spinner = document.getElementById('dwpSpinner');
      const btnText = document.getElementById('dwpBtnText');
      const status  = document.getElementById('dwpStatus');

      // Basic validation
      if (!name) {
        status.className = 'dwp-status error';
        status.textContent = 'Please enter your name.';
        return;
      }
      if (phone.length < 12) {
        status.className = 'dwp-status error';
        status.textContent = 'Please enter a valid 10-digit phone number.';
        return;
      }
      if (!group) {
        status.className = 'dwp-status error';
        status.textContent = 'Please choose which games to receive alerts for.';
        return;
      }

      // Loading state
      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Signing Up...';
      status.className = 'dwp-status';
      status.style.display = 'none';

      try {
        const res = await fetch('https://hook.us2.make.com/uk5itm1oeac9qkmkkrk26kqc6i9qozwd', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, group })
        });

        if (res.ok) {
          status.className = 'dwp-status success';
          status.textContent = "✓ You're in! Check your phone for a GroupMe invite.";
          document.getElementById('dwpSignupForm').reset();
        } else {
          throw new Error('server error');
        }
      } catch (err) {
        status.className = 'dwp-status error';
        status.textContent = 'Something went wrong. Text (936) 000-0000 to sign up manually.';
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Deal Me In';
      }
    });
  })();
